version: 2

project_name: jn

before:
  hooks:
    - go mod tidy

builds:
  - id: jn
    main: ./cmd/jn
    binary: jn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

upx:
  - ids:
      - jn
    enabled: true
    compress: best
    lzma: false
    brute: false
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: jn
    ids:
      - jn
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ .Version }}-snapshot"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: sandrolain
    name: gnata-ext
  name_template: "jn {{.Version}}"
  header: |
    ## jn {{.Version}}

    JSONata processor with gnata-ext extension functions.
  footer: |
    **Full Changelog**: https://github.com/sandrolain/gnata-ext/compare/{{.PreviousTag}}...{{.Tag}}

    ### Install with Go
    ```sh
    go install github.com/sandrolain/gnata-ext/cmd/jn@{{.Tag}}
    ```
